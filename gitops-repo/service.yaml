apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hello-service-jfrog
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/myorg/hello-service-gitops.git
    targetRevision: main
    path: apps/hello-service/overlays/jfrog
  destination:
    server: https://kubernetes.default.svc
    namespace: hello
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
